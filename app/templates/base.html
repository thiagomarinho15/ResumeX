<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ResumeX{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
  <div class="navbar-left">
    {% if current_user.is_authenticated %}
      <span class="navbar-user">{{ current_user.nome }}</span>
    {% endif %}
  </div>
  <a href="{{ url_for('dashboard') }}" class="navbar-brand">ResumeX</a>
  <div class="navbar-right">
    {% if current_user.is_authenticated %}
      <a href="{{ url_for('sair') }}" class="navbar-cta">Sair</a>
    {% else %}
      <a href="{{ url_for('cadastro') }}" class="navbar-cta">Criar conta</a>
    {% endif %}
  </div>
</nav>

{% include '_flash_messages.html' %}

{% block content %}{% endblock %}

{% block scripts %}{% endblock %}

</body>
</html>
